#Spring配置
spring:
  main:
    web-application-type: none  #禁用 Web 服务器
    banner-mode: off  #禁用 Spring Banner
    log-startup-info: false  #禁用启动日志

  #应用配置
  application:
    name: ftcli

  #Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1
      jedis:
        pool:
          max-active: 150
          max-wait: 100
          max-idle: 100
          min-idle: 50
      timeout: 5000ms

#LangChain4j配置
langchain4j:
  open-ai:
    chat-model:
      api-key: xxx
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      timeout: 30s
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: xxx
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      timeout: 30s
      log-requests: true
      log-responses: true

#日志配置
logging:
  level:
    root: WARN  #只输出警告及以上级别

#AI配置
ai:
  chat-memory:
    max-tokens: 95000
    token-estimator-model: gpt-4o